# baseURL: "https://sourcevault.github.io/"
relativeURLs: true
paginate: 5
theme: PaperMod

enableRobotsTXT: true
buildDrafts: true
buildFuture: false
buildExpired: false

params:
    assets:
        disableHLJS: false
    title: ExampleSite
    description: "ExampleSite description"
    keywords: [Blog, Portfolio, PaperMod]
    author: sourcevault
    # author: ["Me", "You"] # multiple authors
    DateFormat: "January 2, 2006"
    defaultTheme: light # dark, light
    disableThemeToggle: false
    ShowReadingTime: true
    ShowBreadCrumbs: true
    ShowCodeCopyButtons: false
    disableSpecial1stPost: false
    disableScrollToTop: false
    comments: false
    hidemeta: false
    hideSummary: false
    showtoc: true
    tocopen: false

    # profile-mode
    profileMode:
        enabled: true # needs to be explicitly set
        subtitle: "🖥️ / personal blog and notes."
        imageUrl: ./logo.png # optional
        imageWidth: 150 # custom size
        imageHeight: 150 # custom size
        buttons:
            - name: Github
              url: "https://github.com/sourcevault"
            - name: Resume
              url: "https://sourcevault.github.io/resume/"

    mainSections:
      - posts

    homeInfoParams:
      Title: "💻👨‍💻️⌨️"
      Content: "sourcevault's personal blog"
      # Subtitle:
      # imageUrl: ./logo.png # optional
      # imageWidth: 150 # custom size
      # imageHeight: 150 # custom size


menu:
    main:
        - identifier: archives
          name: posts
          url: /archives/
